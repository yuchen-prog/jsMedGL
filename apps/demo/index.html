<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jsMedgl Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .header {
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #00d9ff;
    }
    .header .version {
      font-size: 12px;
      color: #666;
    }
    .header .title {
      font-size: 18px;
      font-weight: 600;
      color: #00d9ff;
    }
    .body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .sidebar {
      width: 260px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .section {
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid #0f3460;
    }
    .section:last-child {
      border-bottom: none;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #666;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .file-btn {
      display: block;
      padding: 8px 16px;
      background: #0f3460;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: #eee;
      text-align: center;
      transition: background 0.2s;
    }
    .file-btn:hover {
      background: #00d9ff;
      color: #000;
    }
    .error {
      margin-top: 8px;
      color: #ff6b6b;
      font-size: 12px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #aaa;
      padding: 3px 0;
    }
    .info-row span:first-child {
      color: #666;
    }
    .control-row {
      margin-bottom: 8px;
    }
    .control-row label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .control-row input[type="range"] {
      width: 100%;
    }
    .presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .preset-btn {
      padding: 4px 10px;
      background: #0f3460;
      border: none;
      border-radius: 4px;
      color: #eee;
      cursor: pointer;
      font-size: 11px;
      transition: background 0.2s;
    }
    .preset-btn:hover {
      background: #00d9ff;
      color: #000;
    }
    .viewer-area {
      flex: 1;
      position: relative;
      background: #0a0a1a;
    }
    .viewer {
      width: 100%;
      height: 100%;
    }
    #drop-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 16px;
      pointer-events: none;
    }
    #drop-overlay.active {
      background: rgba(0, 217, 255, 0.05);
      border: 2px dashed #00d9ff;
      color: #00d9ff;
    }
    .drop-hint {
      font-size: 12px;
      color: #333;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
