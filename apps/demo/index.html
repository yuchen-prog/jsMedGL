<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jsMedgl Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .header {
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #00d9ff;
    }
    .header .version {
      font-size: 12px;
      color: #666;
    }
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .sidebar {
      width: 280px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      padding: 16px;
      overflow-y: auto;
    }
    .viewer-container {
      flex: 1;
      position: relative;
      background: #0a0a1a;
    }
    .dropzone {
      position: absolute;
      inset: 20px;
      border: 2px dashed #0f3460;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
      transition: all 0.2s;
    }
    .dropzone:hover, .dropzone.active {
      border-color: #00d9ff;
      background: rgba(0, 217, 255, 0.05);
    }
    .dropzone input {
      display: none;
    }
    .dropzone label {
      padding: 12px 24px;
      background: #0f3460;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
    }
    .dropzone label:hover {
      background: #00d9ff;
      color: #000;
    }
    .control-group {
      margin-bottom: 20px;
    }
    .control-group h3 {
      font-size: 12px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    .control-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #0f3460;
    }
    .control-item label {
      font-size: 13px;
      color: #aaa;
    }
    .control-item input[type="range"] {
      width: 100px;
    }
    .control-item input[type="number"] {
      width: 70px;
      background: #0a0a1a;
      border: 1px solid #0f3460;
      color: #eee;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .btn {
      padding: 8px 16px;
      background: #0f3460;
      border: none;
      border-radius: 4px;
      color: #eee;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #00d9ff;
      color: #000;
    }
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
